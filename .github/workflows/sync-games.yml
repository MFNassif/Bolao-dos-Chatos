name: Sync Games

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: scripts
        run: npm ci --omit=dev --no-audit --no-fund

      - name: Run sync
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FOOTBALL_API_BASE_URL: 'https://api.football-data.org/v4'
          FOOTBALL_API_COMPETITION_ID: ${{ vars.FOOTBALL_API_COMPETITION_ID || 'WC' }}
          FOOTBALL_API_SEASON: ${{ vars.FOOTBALL_API_SEASON || '2026' }}
        run: node syncGames.js

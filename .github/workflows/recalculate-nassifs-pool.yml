name: Recalculate Nassifs Pool

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/recalculate-nassifs-pool.yml'
      - 'scripts/recalculateNassifsPool.js'
      - 'scripts/lib/scoringEngine.js'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  recalc:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install deps
        working-directory: scripts
        run: npm ci --omit=dev --no-audit --no-fund

      - name: Recalculate Nassifs
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
        run: node recalculateNassifsPool.js

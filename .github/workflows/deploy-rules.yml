name: Deploy Firestore Rules & Indexes

# Publica regras de segurança e índices do Firestore.
# Roda automaticamente quando você altera firestore.rules ou firestore.indexes.json.
on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Deploy regras e índices
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_B64" | base64 -d > /tmp/sa.json
          npm install -g firebase-tools --no-audit --no-fund
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json \
            firebase deploy --only firestore:rules,firestore:indexes \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive
          rm -f /tmp/sa.json
